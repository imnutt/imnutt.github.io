<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THB ⇄ BTC Converter | ราคา Bitcoin วันนี้</title>
<meta name="description" content="แปลง THB, BTC, Satoshi, USD แบบ real-time พร้อมราคาเฉลี่ย 7/30/100 วัน">
<meta property="og:title" content="THB ⇄ BTC Converter | Live Bitcoin Price">
<meta property="og:description" content="Convert THB, BTC, Satoshi, USD in real-time with MA 7/30/100 day averages">
<meta property="og:image" content="https://nutt.cc/btc/og-image.png">
<meta property="og:url" content="https://nutt.cc/btc">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://nutt.cc/btc/og-image.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f7931a'/%3E%3Ctext x='50' y='72' font-size='68' font-family='Arial Black,sans-serif' font-weight='900' text-anchor='middle' fill='white'%3E%E2%82%BF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --orange: #f7931a;
    --orange-dim: rgba(247,147,26,0.12);
    --green: #22c55e;
    --red: #ef4444;
    --text: #f0f0f0;
    --muted: #666;
    --subtle: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at 50% 0%, rgba(247,147,26,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--orange);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }

  /* Container */
  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }

  /* Price card */
  .price-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .price-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .price-card-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .price-change {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .price-change.up { color: var(--green); background: rgba(34,197,94,0.1); }
  .price-change.down { color: var(--red); background: rgba(239,68,68,0.1); }

  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .price-item label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .price-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.25rem;
    font-weight: 700;
  }
  .price-value.thb { color: var(--orange); }
  .price-value.usd { color: #60a5fa; }
  .price-value.rate { color: #a78bfa; font-size: 1rem; }

  .price-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .rate-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .rate-label {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .last-updated {
    font-size: 0.72rem;
    color: var(--subtle);
  }

  /* MA card */
  .ma-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .ma-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .ma-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .ma-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .ma-diff {
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
  }
  .ma-diff.above { color: var(--green); }
  .ma-diff.below { color: var(--red); }

  .ma-usd {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: #60a5fa;
    margin-bottom: 3px;
  }

  /* Converter */
  .converter-title {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .input-group {
    margin-bottom: 14px;
    position: relative;
  }

  .input-group:last-of-type {
    margin-bottom: 0;
  }

  .input-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 50px 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: var(--orange);
  }

  .input-wrap input::placeholder {
    color: var(--subtle);
    font-size: 0.85rem;
  }

  .input-unit {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    pointer-events: none;
  }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0;
    color: var(--subtle);
    font-size: 0.75rem;
  }

  .divider-row::before, .divider-row::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Clear button */
  .btn-clear {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover {
    border-color: var(--subtle);
    color: var(--text);
    background: var(--surface2);
  }

  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    display: inline-block;
    min-width: 80px;
    height: 1.2em;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Note */
  .note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--subtle);
    margin-top: 8px;
  }

  /* Responsive */
  @media (max-width: 400px) {
    .price-grid { grid-template-columns: 1fr; }
    .ma-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>THB ⇄ BTC Converter</h1>
  <p class="subtitle">แปลง THB · BTC · SAT · USD แบบ real-time</p>
</header>

<div class="container">

  <!-- Price Card -->
  <div class="price-card">
    <div class="price-card-header">
      <span class="price-card-title">ราคา Bitcoin ปัจจุบัน</span>
      <span class="price-change up" id="btcChange"><span class="shimmer"></span></span>
    </div>

    <div class="price-grid">
      <div class="price-item">
        <label>THB</label>
        <div class="price-value thb" id="btcThb"><span class="shimmer"></span></div>
      </div>
      <div class="price-item">
        <label>USD</label>
        <div class="price-value usd" id="btcUsd"><span class="shimmer"></span></div>
      </div>
    </div>

    <hr class="price-divider">

    <div class="rate-row">
      <span class="rate-label">อัตราแลกเปลี่ยน THB/USD</span>
      <span class="price-value rate" id="thbUsdRate"><span class="shimmer"></span></span>
    </div>

    <div style="margin-top:6px; text-align:right;">
      <span class="last-updated" id="lastUpdated">กำลังโหลด...</span>
    </div>
  </div>

  <!-- Moving Average Card -->
  <div class="card">
    <div class="converter-title">ราคาเฉลี่ย Bitcoin</div>
    <div class="ma-grid">
      <div class="ma-item">
        <div class="ma-label">MA 7 วัน</div>
        <div class="ma-value" id="ma7"><span class="shimmer"></span></div>
        <div class="ma-usd" id="ma7usd"></div>
        <div class="ma-diff" id="ma7diff"></div>
      </div>
      <div class="ma-item">
        <div class="ma-label">MA 30 วัน</div>
        <div class="ma-value" id="ma30"><span class="shimmer"></span></div>
        <div class="ma-usd" id="ma30usd"></div>
        <div class="ma-diff" id="ma30diff"></div>
      </div>
      <div class="ma-item">
        <div class="ma-label">MA 100 วัน</div>
        <div class="ma-value" id="ma100"><span class="shimmer"></span></div>
        <div class="ma-usd" id="ma100usd"></div>
        <div class="ma-diff" id="ma100diff"></div>
      </div>
    </div>
  </div>

  <!-- Converter Card -->
  <div class="card">
    <div class="converter-title">แปลงสกุลเงิน</div>

    <div class="input-group">
      <label class="input-label">Thai Baht (THB)</label>
      <div class="input-wrap">
        <input type="number" id="inputThb" placeholder="กรอกจำนวนเงินบาท" inputmode="decimal">
        <span class="input-unit">฿</span>
      </div>
    </div>

    <div class="divider-row">⇄</div>

    <div class="input-group">
      <label class="input-label">Bitcoin (BTC)</label>
      <div class="input-wrap">
        <input type="number" id="inputBtc" placeholder="0.00000000" inputmode="decimal">
        <span class="input-unit">BTC</span>
      </div>
    </div>

    <div class="input-group" style="margin-top:14px">
      <label class="input-label">Satoshi (SAT)</label>
      <div class="input-wrap">
        <input type="number" id="inputSat" placeholder="กรอกจำนวน Satoshi" inputmode="decimal">
        <span class="input-unit">SAT</span>
      </div>
    </div>

    <div class="divider-row">⇄</div>

    <div class="input-group">
      <label class="input-label">US Dollar (USD)</label>
      <div class="input-wrap">
        <input type="number" id="inputUsd" placeholder="0.00" inputmode="decimal">
        <span class="input-unit">$</span>
      </div>
    </div>

    <button class="btn-clear" id="btnClear">ล้างข้อมูล</button>
    <p class="note">1 BTC = 100,000,000 Satoshi</p>
  </div>

</div>

<script>
  const SATS_PER_BTC = 100_000_000;

  let btcPriceThb = null;
  let btcPriceUsd = null;
  let thbPerUsd = null;
  let isUpdating = false;

  // Format helpers
  const fmtThb = v => '฿' + Math.round(v).toLocaleString('th-TH');
  const fmtUsd = v => '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtBtc = v => v.toFixed(8);
  const fmtSat = v => Math.round(v).toLocaleString('en-US');

  async function fetchPrices() {
    try {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=thb,usd&include_24hr_change=true');
      const data = await res.json();
      btcPriceThb = data.bitcoin.thb;
      btcPriceUsd = data.bitcoin.usd;
      const change = data.bitcoin.usd_24h_change;

      // THB/USD rate
      thbPerUsd = btcPriceThb / btcPriceUsd;

      // Update price card
      document.getElementById('btcThb').textContent = fmtThb(btcPriceThb);
      document.getElementById('btcUsd').textContent = fmtUsd(btcPriceUsd);
      document.getElementById('thbUsdRate').textContent = '$1 = ฿' + thbPerUsd.toFixed(2);

      const changeEl = document.getElementById('btcChange');
      const sign = change >= 0 ? '+' : '';
      changeEl.textContent = sign + change.toFixed(2) + '%';
      changeEl.className = 'price-change ' + (change >= 0 ? 'up' : 'down');

      const now = new Date();
      document.getElementById('lastUpdated').textContent = 'อัปเดต ' + now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    } catch(e) {
      document.getElementById('lastUpdated').textContent = 'โหลดไม่ได้ ลองใหม่...';
    }
  }

  async function fetchMA() {
    try {
      const [resThb, resUsd] = await Promise.all([
        fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=thb&days=100&interval=daily'),
        fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=100&interval=daily')
      ]);
      const [dataThb, dataUsd] = await Promise.all([resThb.json(), resUsd.json()]);

      const pricesThb = dataThb.prices.map(p => p[1]);
      const pricesUsd = dataUsd.prices.map(p => p[1]);

      const calcMA = (arr, n) => {
        const slice = arr.slice(-n);
        return slice.reduce((a,b) => a+b, 0) / slice.length;
      };

      const periods = [7, 30, 100];
      const ids = ['ma7','ma30','ma100'];

      periods.forEach((n, i) => {
        const maThb = calcMA(pricesThb, n);
        const maUsd = calcMA(pricesUsd, n);

        document.getElementById(ids[i]).textContent = fmtThb(maThb);
        document.getElementById(ids[i]+'usd').textContent = fmtUsd(maUsd);

        if (btcPriceThb) {
          const pct = ((btcPriceThb - maThb) / maThb * 100);
          const sign = pct >= 0 ? '+' : '';
          const el = document.getElementById(ids[i]+'diff');
          el.textContent = sign + pct.toFixed(1) + '%';
          el.className = 'ma-diff ' + (pct >= 0 ? 'above' : 'below');
        }
      });

    } catch(e) {
      ['ma7','ma30','ma100'].forEach(id => {
        document.getElementById(id).textContent = '-';
      });
    }
  }

  // Converter logic
  function setVal(id, val) {
    const el = document.getElementById(id);
    el.value = val === '' ? '' : val;
  }

  function fromThb(thb) {
    if (!btcPriceThb || !btcPriceUsd || !thbPerUsd) return;
    const btc = thb / btcPriceThb;
    const sat = btc * SATS_PER_BTC;
    const usd = thb / thbPerUsd;
    setVal('inputBtc', fmtBtc(btc));
    setVal('inputSat', Math.round(sat));
    setVal('inputUsd', usd.toFixed(2));
  }

  function fromBtc(btc) {
    if (!btcPriceThb || !btcPriceUsd || !thbPerUsd) return;
    const thb = btc * btcPriceThb;
    const sat = btc * SATS_PER_BTC;
    const usd = btc * btcPriceUsd;
    setVal('inputThb', thb.toFixed(2));
    setVal('inputSat', Math.round(sat));
    setVal('inputUsd', usd.toFixed(2));
  }

  function fromSat(sat) {
    if (!btcPriceThb || !btcPriceUsd || !thbPerUsd) return;
    const btc = sat / SATS_PER_BTC;
    const thb = btc * btcPriceThb;
    const usd = btc * btcPriceUsd;
    setVal('inputThb', thb.toFixed(2));
    setVal('inputBtc', fmtBtc(btc));
    setVal('inputUsd', usd.toFixed(2));
  }

  function fromUsd(usd) {
    if (!btcPriceThb || !btcPriceUsd || !thbPerUsd) return;
    const btc = usd / btcPriceUsd;
    const thb = usd * thbPerUsd;
    const sat = btc * SATS_PER_BTC;
    setVal('inputThb', thb.toFixed(2));
    setVal('inputBtc', fmtBtc(btc));
    setVal('inputSat', Math.round(sat));
  }

  function bindInput(id, fn, others) {
    document.getElementById(id).addEventListener('input', e => {
      if (isUpdating) return;
      isUpdating = true;
      const val = parseFloat(e.target.value);
      if (!isNaN(val) && val >= 0) {
        fn(val);
      } else {
        others.forEach(oid => setVal(oid, ''));
      }
      isUpdating = false;
    });
  }

  bindInput('inputThb', fromThb, ['inputBtc','inputSat','inputUsd']);
  bindInput('inputBtc', fromBtc, ['inputThb','inputSat','inputUsd']);
  bindInput('inputSat', fromSat, ['inputThb','inputBtc','inputUsd']);
  bindInput('inputUsd', fromUsd, ['inputThb','inputBtc','inputSat']);

  document.getElementById('btnClear').addEventListener('click', () => {
    ['inputThb','inputBtc','inputSat','inputUsd'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('inputThb').focus();
  });

  // Init
  fetchPrices().then(() => fetchMA());

  // Refresh price every 30s
  setInterval(fetchPrices, 30000);
</script>

</body>
</html>
